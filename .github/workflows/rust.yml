name: Rust CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check-and-lint:
    name: Check & Lint
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          cache: true
          cache-key: rust-ubuntu-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential protobuf-compiler zip

      - name: Run Cargo Check
        run: cargo check --locked -p kaspa-stratum-bridge

      - name: Run Clippy
        run: cargo clippy --locked -p kaspa-stratum-bridge -- -D warnings

      - name: Run tests
        run: cargo test --locked -p kaspa-stratum-bridge

  build-release-assets:
    name: Build Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_key: ubuntu
            binary_name: stratum-bridge
            asset_name: stratum-bridge-linux-amd64
            binary_path: target/release/stratum-bridge
          - os: windows-latest
            os_key: windows
            binary_name: stratum-bridge.exe
            asset_name: stratum-bridge-windows-amd64
            binary_path: target/release/stratum-bridge.exe
          # Apple Silicon (arm64): https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
          - os: macos-latest
            os_key: macos-arm64
            binary_name: stratum-bridge
            asset_name: stratum-bridge-macos-arm64
            binary_path: target/release/stratum-bridge
          # Intel (x86_64): GitHub label macos-15-intel (replaces retired macos-13); supported until ~Fall 2027.
          - os: macos-15-intel
            os_key: macos-amd64
            binary_name: stratum-bridge
            asset_name: stratum-bridge-macos-amd64
            binary_path: target/release/stratum-bridge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-key: rust-${{ matrix.os_key }}-${{ hashFiles('**/Cargo.lock') }}

      # fuse/libfuse2: appimagetool (and some AppImage runs) on GitHub-hosted runners; rsvg: bridge/appimage/build.sh icon step.
      # Mirrors kaspanet deploy.yaml “Install AppImage packaging deps”.
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential protobuf-compiler zip musl-tools librsvg2-bin fuse libfuse2

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        run: cargo build --locked --verbose --release --features rkstratum_cpu_miner -p kaspa-stratum-bridge

      # Desktop shell is not a workspace member; same feature as local: cargo build --manifest-path bridge-tauri/src-tauri/Cargo.toml --features rkstratum_cpu_miner
      - name: Build rkstratum-bridge-desktop (Windows, macOS)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        run: cargo build --locked --verbose --release --features rkstratum_cpu_miner --manifest-path bridge-tauri/src-tauri/Cargo.toml

      - name: Add musl Rust target (Linux)
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-musl

      # kaspanet/rusty-kaspa CI: musl stratum-bridge needs this link flag for mimalloc / C++ symbol collisions (see bridge comments).
      - name: Build stratum-bridge (musl) and AppImage (Linux)
        id: appimage
        if: runner.os == 'Linux'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          export RUSTFLAGS="${RUSTFLAGS:-} -C link-arg=-Wl,--allow-multiple-definition"
          cargo build --locked --verbose --release --target x86_64-unknown-linux-musl --features rkstratum_cpu_miner -p kaspa-stratum-bridge
          bash bridge/appimage/build.sh "$TAG"

      - name: Pack AppImage tarball (Linux)
        if: runner.os == 'Linux' && steps.appimage.outcome == 'success'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          IMG="stratum-bridge-${TAG}-x86_64.AppImage"
          tar -czf "${IMG}.tar.gz" "$IMG"

      - name: Upload AppImage workflow artifact (Linux)
        if: runner.os == 'Linux' && steps.appimage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: stratum-bridge-linux-appimage
          path: ./stratum-bridge-${{ github.ref_name }}-x86_64.AppImage.tar.gz

      - name: Package release assets
        run: |
          mkdir staging
          cp README.md staging/
          cp LICENSE staging/
          cp bridge/config.yaml staging/config.yaml
          cp ${{ matrix.binary_path }} staging/${{ matrix.binary_name }}
      - name: Add rkstratum-bridge-desktop to staging (Windows)
        if: runner.os == 'Windows'
        run: cp bridge-tauri/src-tauri/target/release/rkstratum-bridge-desktop.exe staging/

      - name: Add rkstratum-bridge-desktop to staging (macOS)
        if: runner.os == 'macOS'
        run: cp bridge-tauri/src-tauri/target/release/rkstratum-bridge-desktop staging/

      - name: Create tar.gz archive (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -C staging -czf ${{ matrix.asset_name }}.tar.gz .

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path staging\* -DestinationPath ${{ matrix.asset_name }}.zip

      # .zip built on macOS (Finder-friendly; preserves +x on binaries inside the archive for unzip on macOS).
      - name: Create zip archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          (cd staging && zip -r "${GITHUB_WORKSPACE}/${{ matrix.asset_name }}.zip" .)

      - name: Upload workflow artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./${{ matrix.asset_name }}.tar.gz

      - name: Upload workflow artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./${{ matrix.asset_name }}.zip

      - name: Upload workflow artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./${{ matrix.asset_name }}.zip

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-release-assets]
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  build-and-push-docker:
    name: Build and Push Docker Image
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta (Docker Hub)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        id: meta_dockerhub
        uses: docker/metadata-action@v5
        with:
          images: kkluster/rusty-kaspa-stratum
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image (Docker Hub)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub Description
        if: ${{ success() && github.event_name == 'workflow_dispatch' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: kkluster/rusty-kaspa-stratum
          readme-filepath: ./README.md
          short-description: "Rust implementation of Kaspa Stratum server"
