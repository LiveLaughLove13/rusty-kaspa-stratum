<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <nav class="rk-main-nav border-b border-card relative rounded-b-2xl shadow-lg shadow-black/25">
    <div class="container mx-auto px-4 sm:px-5 py-4 sm:py-5 max-w-[1680px]">
      <div class="rk-nav-top flex flex-col gap-3 sm:gap-4">
        <div class="flex flex-wrap items-center gap-2 sm:gap-3 justify-end">
          <div id="rkNavClockSlot" class="shrink-0"></div>
          <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto sm:ml-auto">
          <nav class="rk-dash-subnav flex flex-wrap items-center gap-1 sm:gap-1.5 rounded-xl border border-white/[0.08] bg-black/25 px-2 py-1.5 sm:px-2.5" aria-label="Dashboard pages">
            <a class="rk-dash-subnav__link" href="index.html">Overview</a>
            <a class="rk-dash-subnav__link" href="metrics.html">Metrics</a>
            <a class="rk-dash-subnav__link rk-dash-subnav__link--active" href="node.html">Node</a>
            <a class="rk-dash-subnav__link" href="trends.html">Trends</a>
            <a class="rk-dash-subnav__link" href="blocks.html">Blocks</a>
            <a class="rk-dash-subnav__link" href="workers.html">Workers</a>
          </nav>
            <a class="rk-nav-cta rk-nav-cta--ghost" href="raw.html">Raw</a>
            <a class="rk-nav-cta rk-nav-cta--primary"
               href="https://github.com/kaspanet" target="_blank" rel="noopener noreferrer">
              <span aria-hidden="true">
                <svg viewBox="0 0 24 24" class="h-4 w-4 shrink-0" fill="currentColor"><path d="M12 .297a12 12 0 0 0-3.793 23.405c.6.111.793-.261.793-.58v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.757-1.333-1.757-1.089-.745.083-.73.083-.73 1.205.084 1.84 1.237 1.84 1.237 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.334-5.466-5.932 0-1.31.468-2.381 1.235-3.221-.123-.303-.535-1.523.117-3.176 0 0 1.008-.322 3.301 1.23a11.52 11.52 0 0 1 6.003 0c2.29-1.552 3.297-1.23 3.297-1.23.654 1.653.242 2.873.119 3.176.77.84 1.233 1.911 1.233 3.221 0 4.61-2.807 5.628-5.479 5.922.43.372.823 1.102.823 2.222v3.293c0 .322.192.694.801.576A12 12 0 0 0 12 .297z"/></svg>
              </span>
              GitHub
            </a>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <div class="container mx-auto px-4 pt-4 pb-6 max-w-[1680px]">
    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 xl:gap-6 items-start">
      <div class="xl:col-span-12 space-y-6">
        <div class="bg-surface-1 rounded-xl p-5 sm:p-6 border border-card rk-panel-elevated h-full min-h-0">
          <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
            <div class="flex flex-wrap items-center gap-2 sm:gap-3 min-w-0">
              <h3 class="text-lg font-semibold kaspa-primary rk-panel-title">Kaspad node</h3>
              <span id="nodeSyncPill" class="rk-pill rk-pill--unknown shrink-0"><span id="nodeSync">-</span></span>
            </div>
            <button type="button" class="bg-surface-2 border border-card px-3 py-1.5 rounded-lg text-xs font-medium text-white hover:border-kaspa-primary flex items-center gap-2 shrink-0" data-collapsible-toggle="node" aria-expanded="true">
              <svg class="h-4 w-4 transition-transform" data-collapsible-icon="node" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 10.94l3.71-3.71a.75.75 0 1 1 1.06 1.06l-4.24 4.24a.75.75 0 0 1-1.06 0L5.21 8.29a.75.75 0 0 1 .02-1.08z" clip-rule="evenodd"/></svg>
              <span data-collapsible-label="node">Collapse</span>
            </button>
          </div>
          <div id="nodePanelError" class="hidden mb-3 text-sm text-amber-400 border border-amber-500/40 rounded-lg px-3 py-2"></div>
          <div data-collapsible-body="node">
            <div class="space-y-3 text-sm">
              <div class="flex justify-between gap-2 items-center py-1.5 border-b border-card/50"><span class="text-gray-400 shrink-0 text-xs uppercase tracking-wide">RPC</span><span id="nodeConnection" class="text-right min-w-0 font-medium">-</span></div>
              <div class="flex justify-between gap-2 items-center py-1.5 border-b border-card/50"><span class="text-gray-400 shrink-0 text-xs uppercase tracking-wide">Network</span><span id="nodeNetwork" class="text-right min-w-0 break-all font-medium">-</span></div>
              <div class="grid grid-cols-2 gap-2">
                <div class="rk-node-tile"><div class="rk-node-tile__label">DAG blocks</div><div id="nodeDagBlocks" class="rk-node-tile__value">-</div></div>
                <div class="rk-node-tile"><div class="rk-node-tile__label">Headers</div><div id="nodeHeaders" class="rk-node-tile__value">-</div></div>
                <div class="rk-node-tile"><div class="rk-node-tile__label">Peers</div><div id="nodePeers" class="rk-node-tile__value">-</div></div>
                <div class="rk-node-tile"><div class="rk-node-tile__label">Virtual DAA</div><div id="nodeDaa" class="rk-node-tile__value">-</div></div>
                <div class="rk-node-tile"><div class="rk-node-tile__label">Sink blue</div><div id="nodeSinkBlue" class="rk-node-tile__value">-</div></div>
                <div
                  class="rk-node-tile cursor-help"
                  title="From kaspad (GetInfo): number of transactions currently in this node’s mempool. It moves up and down with network and wallet traffic. Mining blocks through the bridge does not bulk-fill the mempool."
                >
                  <div class="rk-node-tile__label">Mempool</div>
                  <div id="nodeMempool" class="rk-node-tile__value">-</div>
                </div>
              </div>
              <div class="space-y-1 pt-1">
                <div class="flex justify-between text-[11px] text-gray-500"><span>Header / DAG alignment</span><span id="nodeSyncHealthPct">-</span></div>
                <div class="rk-progress-track" aria-hidden="true"><div id="nodeSyncHealthBar" class="rk-progress-fill rk-progress-fill--sync" style="width:0%"></div></div>
              </div>
              <div class="flex justify-between gap-2 items-baseline pt-1"><span class="text-gray-400 shrink-0 text-xs uppercase tracking-wide">Difficulty (RPC)</span><span id="nodeDifficultyRpc" class="text-right tabular-nums font-semibold kaspa-primary">-</span></div>
              <p id="nodeDifficultyHint" class="text-xs text-gray-500 leading-relaxed hidden -mt-0.5 max-w-prose"></p>
              <div class="space-y-1.5 pt-1 border-t border-card/40">
                <div class="text-gray-400 text-xs uppercase tracking-wide">Tip hash</div>
                <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:gap-3 min-w-0">
                  <span id="nodeTip" class="font-mono text-xs text-gray-200 min-w-0 w-full break-all [overflow-wrap:anywhere] leading-relaxed">-</span>
                  <button type="button" id="nodeTipCopy" class="hidden bg-surface-2 border border-card px-2 py-0.5 rounded text-xs hover:border-kaspa-primary shrink-0 self-start sm:mt-0.5" title="Copy tip hash">Copy</button>
                </div>
              </div>
              <div class="flex justify-between gap-2 text-xs"><span class="text-gray-500">Node snapshot</span><span id="nodePollAge" class="text-right text-gray-500">-</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="rowDetailModal" class="hidden fixed inset-0 z-50">
    <div id="rowDetailBackdrop" class="absolute inset-0 bg-black/60"></div>
    <div class="absolute inset-0 flex items-end sm:items-center justify-center p-3 sm:p-6">
      <div class="bg-surface-1 border border-card rounded-2xl w-full max-w-xl shadow-xl">
        <div class="flex items-center justify-between gap-4 px-5 py-4 border-b border-card">
          <div class="min-w-0">
            <div id="rowDetailTitle" class="text-base font-semibold text-white truncate">Details</div>
            <div class="text-xs text-gray-400">Tap Copy to copy values</div>
          </div>
          <button id="rowDetailClose" type="button" class="bg-surface-2 border border-card px-3 py-2 rounded-lg text-sm font-medium text-white hover:border-kaspa-primary">Close</button>
        </div>
        <div id="rowDetailBody" class="px-5 py-4 space-y-3"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <script src="js/api-base.js"></script>
  <script src="js/dashboard.js"></script>

  <div id="toast" class="hidden fixed right-4 top-4 z-50 bg-surface-1 border border-card px-4 py-2 rounded-lg text-sm text-white"></div>
</body>
</html>
